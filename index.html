<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Enhanced Aliquot Search</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --purple:#6366f1;--purple-dark:#4f46e5;
      --green:#10b981;--green-dark:#059669;
      --blue:#3b82f6;--blue-dark:#2563eb;
      --red:#ef4444;--gray:#6b7280;
      --border:#e5e7eb;--bg:#f5f6fa;
    }
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:var(--bg);color:#111827;min-height:100vh;padding:20px}
    .container{max-width:1400px;margin:0 auto}

    /* Header */
    .header{margin-bottom:24px;display:flex;justify-content:space-between;align-items:center}
    .header h1{font-size:1.75rem;font-weight:700;color:#111}
    .user-badge{display:inline-flex;align-items:center;gap:6px;
      font-size:.8rem;padding:6px 12px;border-radius:20px;
      background:#ede9fe;color:#4f46e5;font-weight:500}
    .user-badge svg{width:14px;height:14px}

    /* Search Form */
    .search-card{background:#fff;border:1px solid var(--border);border-radius:12px;
      padding:24px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:16px;margin-bottom:16px}
    .form-group{display:flex;flex-direction:column;gap:6px}
    .form-label{font-size:.8rem;font-weight:600;color:#374151}
    .form-input,.form-select{padding:9px 12px;border:1px solid var(--border);
      border-radius:8px;font-size:.9rem;outline:none;transition:border-color .15s;
      background:#fff}
    .form-input:focus,.form-select:focus{border-color:var(--purple)}

    .checkbox-group{display:flex;gap:20px;flex-wrap:wrap;margin-top:10px}
    .checkbox-label{display:flex;align-items:center;gap:6px;font-size:.85rem;
      color:#374151;cursor:pointer;user-select:none}
    .checkbox-label input[type="checkbox"]{cursor:pointer;width:16px;height:16px}

    .search-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
    button{padding:10px 20px;border:none;border-radius:8px;font-size:.875rem;
      font-weight:600;cursor:pointer;transition:all .15s;line-height:1}
    button:disabled{opacity:.45;cursor:not-allowed}
    .btn-primary{background:var(--purple);color:#fff}
    .btn-primary:hover:not(:disabled){background:var(--purple-dark)}
    .btn-secondary{background:#f3f4f6;color:#374151}
    .btn-secondary:hover:not(:disabled){background:#e5e7eb}

    /* Status */
    .status{padding:10px 14px;border-radius:8px;font-size:.85rem;
      margin-top:12px;display:none}
    .status.info{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;display:block}
    .status.ok{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0;display:block}
    .status.err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;display:block}

    /* Results Grid */
    .results-container{display:grid;gap:16px}
    .result-card{background:#fff;border:1px solid var(--border);border-radius:12px;
      padding:20px;display:grid;grid-template-columns:300px 1fr;gap:20px;
      box-shadow:0 1px 3px rgba(0,0,0,.04);transition:box-shadow .15s}
    .result-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}

    /* Image Viewer */
    .image-panel{position:relative;background:#f9fafb;border:1px solid var(--border);
      border-radius:8px;overflow:hidden;height:280px}
    .image-viewer{width:100%;height:100%;cursor:move;overflow:hidden;position:relative}
    .image-viewer img{display:block;transform-origin:0 0;transition:none;
      position:absolute;top:0;left:0}
    .image-placeholder{display:flex;align-items:center;justify-content:center;
      height:100%;color:#9ca3af;font-size:.9rem}
    .zoom-controls{position:absolute;top:8px;right:8px;display:flex;gap:4px;
      background:rgba(255,255,255,.95);padding:4px;border-radius:6px;
      box-shadow:0 2px 8px rgba(0,0,0,.15)}
    .zoom-btn{width:28px;height:28px;border:none;border-radius:4px;
      background:#f3f4f6;color:#374151;cursor:pointer;font-size:1.1rem;
      font-weight:600;line-height:1;display:flex;align-items:center;
      justify-content:center;transition:background .15s}
    .zoom-btn:hover{background:#e5e7eb}

    /* Result Info */
    .result-info{display:flex;flex-direction:column;gap:12px}
    .result-header{display:flex;justify-content:space-between;align-items:start;gap:12px}
    .result-name{font-size:1.15rem;font-weight:700;color:#111}
    .result-name a{color:var(--blue);text-decoration:none}
    .result-name a:hover{text-decoration:underline}
    .result-type{display:inline-block;padding:4px 10px;border-radius:6px;
      background:#e0e7ff;color:#4338ca;font-size:.75rem;font-weight:600}

    .info-grid{display:grid;grid-template-columns:140px 1fr;gap:8px 12px;
      font-size:.85rem;padding:12px;background:#f9fafb;border-radius:8px}
    .info-label{color:#6b7280;font-weight:500}
    .info-value{color:#111827;word-break:break-word}
    .info-value a{color:var(--blue);text-decoration:none}
    .info-value a:hover{text-decoration:underline}

    .disease-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
    .disease-tag{padding:4px 10px;border-radius:6px;background:#fef3c7;
      color:#92400e;font-size:.75rem;font-weight:500}

    .hidden{display:none!important}
    .loading{opacity:.6;pointer-events:none}

    /* Help text */
    .help-text{font-size:.8rem;color:var(--gray);margin-top:8px;
      padding:10px;background:#f9fafb;border-radius:6px}
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div>
      <h1>Enhanced Aliquot Search</h1>
    </div>
    <div class="user-badge" id="userBadge" style="display:none">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      <span id="userEmail">—</span>
    </div>
  </div>

  <!-- Authentication Section (Always Visible) -->
  <div class="search-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-size:.9rem;font-weight:600;color:#374151">🔐 Authentication</div>
      <div class="user-badge" id="userBadgeTop" style="display:none;margin:0">
        <span id="userEmailTop">—</span>
      </div>
    </div>
    <p style="font-size:.85rem;color:#6b7280;margin-bottom:12px">
      Paste your CF_Authorization token from
      <a href="https://aliquot.txgmesh.net" target="_blank" style="color:#6366f1">aliquot.txgmesh.net</a>
      (DevTools → Application → Cookies → CF_Authorization)
    </p>
    <div style="display:flex;gap:8px">
      <input type="password" id="cfTokenInput" placeholder="Paste CF_Authorization token here..."
             style="flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:.85rem;font-family:monospace">
      <button class="btn-primary" onclick="saveCFToken()">Set Token</button>
    </div>
    <div class="status" id="authStatus"></div>
  </div>

  <!-- Search Form -->
  <div class="search-card">
    <form id="searchForm" onsubmit="doSearch(event)">
      <div class="form-grid">
        <!-- Biospecimen ID/Name -->
        <div class="form-group">
          <label class="form-label" for="specimenName">Biospecimen ID / Name</label>
          <input type="text" id="specimenName" class="form-input"
                 placeholder="e.g. 24-15515-LU-5">
        </div>

        <!-- Biospecimen Type -->
        <div class="form-group">
          <label class="form-label" for="bioSpecimenType">Biospecimen Type</label>
          <select id="bioSpecimenType" class="form-select">
            <option value="">All Types</option>
            <option value="FFPE_BLOCK">FFPE Block</option>
            <option value="FROZEN_OCT_BLOCK">Frozen OCT Block</option>
            <option value="TISSUE_MICROARRAY">Tissue Microarray</option>
          </select>
        </div>

        <!-- Tissue Type -->
        <div class="form-group">
          <label class="form-label" for="tissueType">Tissue Type</label>
          <input type="text" id="tissueType" class="form-input"
                 placeholder="e.g. lung, brain">
        </div>

        <!-- Disease Type -->
        <div class="form-group">
          <label class="form-label" for="diseaseType">Disease Type</label>
          <input type="text" id="diseaseType" class="form-input"
                 placeholder="e.g. cancer, normal">
        </div>
      </div>

      <!-- Checkboxes -->
      <div class="form-group">
        <label class="form-label">Include Only (optional filters)</label>
        <div class="checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" id="hasInventoryLocations">
            <span>Has Inventory Locations</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="hasImageLinks">
            <span>Has Image Links</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="hasExperiments">
            <span>Has Experiments</span>
          </label>
        </div>
      </div>

      <!-- Actions -->
      <div class="search-actions">
        <button type="button" class="btn-secondary" onclick="clearForm()">Clear</button>
        <button type="submit" class="btn-primary" id="searchBtn">Search</button>
      </div>
    </form>

    <div class="status" id="searchStatus"></div>
  </div>

  <!-- Results -->
  <div id="resultsContainer" class="results-container hidden"></div>

</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────
let userEmail = '';
let userName = '';
let imageStates = {}; // Track pan/zoom state for each image
let cfToken = localStorage.getItem('cf_token') || '';

// ─── Authentication ───────────────────────────────────────────────────────
function saveCFToken() {
  const token = document.getElementById('cfTokenInput').value.trim();
  if (!token) {
    setStatus('authStatus', 'Please enter a token', 'err');
    return;
  }

  cfToken = token;
  localStorage.setItem('cf_token', token);

  // Set as cookie for server-side auth
  document.cookie = `CF_Authorization=${token}; path=/; SameSite=Lax`;

  setStatus('authStatus', '✓ Token saved! Refreshing...', 'ok');
  setTimeout(() => window.location.reload(), 1000);
}

async function checkAuth() {
  // Check if we have CF token (from cookie or localStorage)
  const hasCookieToken = document.cookie.includes('CF_Authorization=');
  const hasLocalToken = !!cfToken;

  if (!hasCookieToken && hasLocalToken) {
    // Restore token to cookie
    document.cookie = `CF_Authorization=${cfToken}; path=/; SameSite=Lax`;
  }

  try {
    const res = await fetch('/api/whoami', { credentials: 'include' });
    const { email, name, source } = await res.json();

    if (email) {
      setUser(email, name);
      // Show authenticated status in the auth section
      document.getElementById('userBadgeTop').style.display = 'inline-flex';
      document.getElementById('userEmailTop').textContent = email;
      setStatus('authStatus', `✓ Authenticated as ${email}`, 'ok');
      return true;
    }
  } catch { /* continue */ }

  return false;
}

// ─── Identity ─────────────────────────────────────────────────────────────
function setUser(email, name) {
  userEmail = email || '';
  userName = name || '';
  const badge = document.getElementById('userBadge');
  if (userEmail) {
    document.getElementById('userEmail').textContent = userName || userEmail;
    badge.style.display = 'inline-flex';
  } else {
    badge.style.display = 'none';
  }
}

window.addEventListener('DOMContentLoaded', checkAuth);

// ─── Search ───────────────────────────────────────────────────────────────
async function doSearch(event) {
  event?.preventDefault();

  const params = new URLSearchParams();

  const name = document.getElementById('specimenName').value.trim();
  if (name) params.append('q', name);

  const type = document.getElementById('bioSpecimenType').value;
  if (type) params.append('bioSpecimenType', type);

  const tissue = document.getElementById('tissueType').value.trim();
  if (tissue) params.append('tissueType', tissue);

  const disease = document.getElementById('diseaseType').value.trim();
  if (disease) params.append('diseaseType', disease);

  if (document.getElementById('hasInventoryLocations').checked)
    params.append('hasInventoryLocations', 'true');
  if (document.getElementById('hasImageLinks').checked)
    params.append('hasImageLinks', 'true');
  if (document.getElementById('hasExperiments').checked)
    params.append('hasExperiments', 'true');

  setStatus('searchStatus', 'Searching…', 'info');
  document.getElementById('searchBtn').disabled = true;
  document.getElementById('resultsContainer').classList.add('hidden');

  try {
    const url = `/api/search?${params.toString()}`;
    const res = await fetch(url, { credentials: 'include' });
    const data = await res.json();

    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

    let results = data.results || [];

    // If "Has Image Links" is checked, filter by checking detail endpoint
    if (document.getElementById('hasImageLinks').checked && results.length > 0) {
      setStatus('searchStatus', `Checking which specimens have images...`, 'info');
      results = await filterByImages(results);
    }

    // If "Has Inventory Locations" is checked, fetch detail data
    if (document.getElementById('hasInventoryLocations').checked && results.length > 0) {
      setStatus('searchStatus', `Fetching inventory locations...`, 'info');
      results = await fetchInventoryLocations(results);
    }

    renderResults(results);
    setStatus('searchStatus',
      `Found ${results.length} biospecimen${results.length === 1 ? '' : 's'}`, 'ok');
  } catch(e) {
    setStatus('searchStatus', `Error: ${e.message}`, 'err');
    document.getElementById('resultsContainer').classList.add('hidden');
  } finally {
    document.getElementById('searchBtn').disabled = false;
  }
}

// ─── Fetch Inventory Locations ────────────────────────────────────────────
async function fetchInventoryLocations(records) {
  const promises = records.map(async (r) => {
    try {
      const res = await fetch(`/api/biospecimens/${r.id}`, { credentials: 'include' });
      if (!res.ok) return r;

      const detail = await res.json();

      // Add inventoryLocations from detail endpoint
      if (detail.inventoryLocations && detail.inventoryLocations.length > 0) {
        r.inventoryLocations = detail.inventoryLocations;
        return r;
      }
      return null; // Filter out if no inventory location
    } catch (e) {
      console.warn('Failed to fetch inventory for', r.name, e);
      return null;
    }
  });

  const results = await Promise.all(promises);
  return results.filter(r => r !== null);
}

// ─── Filter by Images ─────────────────────────────────────────────────────
async function filterByImages(records) {
  const checks = records.map(async (r) => {
    // Check if image exists in additionalProperties
    if (r.additionalProperties && r.additionalProperties.Image) {
      return r;
    }

    // If not in list response, check detail endpoint (parent might have it)
    try {
      const res = await fetch(`/api/biospecimens/${r.id}`, { credentials: 'include' });
      if (!res.ok) return null;

      const detail = await res.json();

      // Check if this specimen or its parent has an image
      const hasImage =
        (detail.additionalProperties && detail.additionalProperties.Image) ||
        (detail.parentBioSpecimen && detail.parentBioSpecimen.additionalProperties && detail.parentBioSpecimen.additionalProperties.Image);

      if (hasImage) {
        // Update record with image data
        if (detail.parentBioSpecimen && detail.parentBioSpecimen.additionalProperties && detail.parentBioSpecimen.additionalProperties.Image) {
          r.additionalProperties = r.additionalProperties || {};
          r.additionalProperties.Image = detail.parentBioSpecimen.additionalProperties.Image;
        }
        return r;
      }
      return null;
    } catch (e) {
      console.warn('Failed to check image for', r.name, e);
      return null;
    }
  });

  const results = await Promise.all(checks);
  return results.filter(r => r !== null);
}

// ─── Render Results ───────────────────────────────────────────────────────
function renderResults(results) {
  const container = document.getElementById('resultsContainer');

  if (!results.length) {
    container.innerHTML = '<p style="text-align:center;color:#9ca3af;padding:40px">No results found</p>';
    container.classList.remove('hidden');
    return;
  }

  imageStates = {};
  container.innerHTML = results.map((r, idx) => {
    const aliquotUrl = `https://aliquot.txgmesh.net/biospecimen/${r.id || r.name}`;
    const heImage = findHEImage(r);
    const diseases = extractDiseases(r);

    return `
      <div class="result-card">
        <!-- Image Panel -->
        <div class="image-panel">
          ${heImage ? `
            <div style="position:relative;width:100%;height:100%;background:#1a1a1a;border-radius:8px;overflow:hidden;">
              <iframe
                src="${heImage}"
                style="width:100%;height:100%;border:none;"
                title="H&E Image Viewer"
                allow="fullscreen"
                onload="this.style.opacity=1"
                style="opacity:0;transition:opacity 0.3s;">
              </iframe>
              <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#9ca3af;pointer-events:none;">
                <p style="font-size:0.875rem;margin-bottom:8px;">Loading Ziggy viewer...</p>
                <p style="font-size:0.75rem;">If blank, <a href="${heImage}" target="_blank" style="color:#6366f1;pointer-events:auto;">open in new tab</a></p>
              </div>
              <a href="${heImage}" target="_blank"
                 style="position:absolute;bottom:8px;right:8px;background:rgba(255,255,255,0.95);border-radius:6px;padding:8px;box-shadow:0 2px 8px rgba(0,0,0,0.15);text-decoration:none;color:#374151;font-size:0.75rem;font-weight:600;z-index:10;">
                Open Full Screen ↗
              </a>
            </div>
          ` : `
            <div class="image-placeholder">No H&E image available</div>
          `}
        </div>

        <!-- Info Panel -->
        <div class="result-info">
          <div class="result-header">
            <div>
              <div class="result-name">
                <a href="${aliquotUrl}" target="_blank">${r.name || r.id}</a>
              </div>
              ${diseases.length ? `
                <div class="disease-tags">
                  ${diseases.map(d => `<span class="disease-tag">${d}</span>`).join('')}
                </div>
              ` : ''}
            </div>
            ${r.bioSpecimenType ? `
              <span class="result-type">${formatType(r.bioSpecimenType)}</span>
            ` : ''}
          </div>

          <div class="info-grid">
            ${r.tissueTypes?.length ? `
              <div class="info-label">Tissue Type</div>
              <div class="info-value">${r.tissueTypes.map(t => t.name).join(', ')}</div>
            ` : ''}
            ${r.primaryDiagnosis ? `
              <div class="info-label">Primary Diagnosis</div>
              <div class="info-value">${r.primaryDiagnosis}</div>
            ` : ''}
            ${r.diseaseType?.name ? `
              <div class="info-label">Disease Type</div>
              <div class="info-value">${r.diseaseType.name}</div>
            ` : ''}
            ${r.inventoryLocations?.length ? `
              <div class="info-label">Inventory Location</div>
              <div class="info-value" style="color:#059669;font-weight:600;">${r.inventoryLocations.join(', ')}</div>
            ` : ''}
            ${r.experiments?.length ? `
              <div class="info-label">Experiments</div>
              <div class="info-value">${r.experiments.length} experiment(s)</div>
            ` : ''}
            <div class="info-label">Specimen ID</div>
            <div class="info-value" style="font-family:monospace;font-size:0.8rem;color:#6b7280;">${r.id}</div>
          </div>
        </div>
      </div>
    `;
  }).join('');

  container.classList.remove('hidden');

  // Initialize image states
  results.forEach((r, idx) => {
    if (findHEImage(r)) {
      initImageState(idx);
    }
  });
}

// ─── Image Viewer ─────────────────────────────────────────────────────────
function initImageState(idx) {
  const img = document.getElementById(`img-${idx}`);
  if (!img) return;

  img.onload = () => {
    const viewer = document.getElementById(`viewer-${idx}`);
    const scale = Math.min(
      viewer.clientWidth / img.naturalWidth,
      viewer.clientHeight / img.naturalHeight,
      1
    );

    imageStates[idx] = {
      scale: scale,
      x: 0,
      y: 0,
      isDragging: false,
      startX: 0,
      startY: 0
    };
    updateTransform(idx);
  };
}

function updateTransform(idx) {
  const state = imageStates[idx];
  const img = document.getElementById(`img-${idx}`);
  if (img && state) {
    img.style.transform = `translate(${state.x}px, ${state.y}px) scale(${state.scale})`;
  }
}

function startPan(event, idx) {
  event.preventDefault();
  const state = imageStates[idx];
  if (!state) return;

  state.isDragging = true;
  state.startX = event.clientX - state.x;
  state.startY = event.clientY - state.y;

  const viewer = document.getElementById(`viewer-${idx}`);

  function onMove(e) {
    if (!state.isDragging) return;
    state.x = e.clientX - state.startX;
    state.y = e.clientY - state.startY;
    updateTransform(idx);
  }

  function onUp() {
    state.isDragging = false;
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function handleWheel(event, idx) {
  event.preventDefault();
  const state = imageStates[idx];
  if (!state) return;

  const delta = event.deltaY > 0 ? 1/1.1 : 1.1;
  const viewer = document.getElementById(`viewer-${idx}`);
  const rect = viewer.getBoundingClientRect();
  const mouseX = event.clientX - rect.left;
  const mouseY = event.clientY - rect.top;

  // Zoom towards mouse position
  const oldScale = state.scale;
  state.scale *= delta;
  state.scale = Math.max(0.1, Math.min(state.scale, 5));

  const scaleChange = state.scale / oldScale;
  state.x = mouseX - (mouseX - state.x) * scaleChange;
  state.y = mouseY - (mouseY - state.y) * scaleChange;

  updateTransform(idx);
}

function zoom(idx, factor) {
  const state = imageStates[idx];
  if (!state) return;

  const viewer = document.getElementById(`viewer-${idx}`);
  const centerX = viewer.clientWidth / 2;
  const centerY = viewer.clientHeight / 2;

  const oldScale = state.scale;
  state.scale *= factor;
  state.scale = Math.max(0.1, Math.min(state.scale, 5));

  const scaleChange = state.scale / oldScale;
  state.x = centerX - (centerX - state.x) * scaleChange;
  state.y = centerY - (centerY - state.y) * scaleChange;

  updateTransform(idx);
}

function resetZoom(idx) {
  const state = imageStates[idx];
  const img = document.getElementById(`img-${idx}`);
  const viewer = document.getElementById(`viewer-${idx}`);
  if (!state || !img || !viewer) return;

  const scale = Math.min(
    viewer.clientWidth / img.naturalWidth,
    viewer.clientHeight / img.naturalHeight,
    1
  );

  state.scale = scale;
  state.x = 0;
  state.y = 0;
  updateTransform(idx);
}

// ─── Helpers ──────────────────────────────────────────────────────────────
function findHEImage(record) {
  // Check additionalProperties.Image first (primary location)
  if (record.additionalProperties && record.additionalProperties.Image) {
    return record.additionalProperties.Image;
  }

  // Fallback to imageLinks array if it exists
  const imageLinks = record.imageLinks;
  if (!imageLinks || !Array.isArray(imageLinks)) return null;

  // Look for H&E image in the image category
  const heImage = imageLinks.find(img =>
    img.category === 'image' &&
    (img.description?.toLowerCase().includes('h&e') ||
     img.description?.toLowerCase().includes('he '))
  );

  if (heImage) return heImage.url || heImage.link;

  // Fallback to first image in 'image' category
  const firstImage = imageLinks.find(img => img.category === 'image');
  return firstImage ? (firstImage.url || firstImage.link) : null;
}

function extractDiseases(record) {
  const diseases = [];
  if (record.diseaseType) {
    if (Array.isArray(record.diseaseType)) {
      diseases.push(...record.diseaseType.map(d => typeof d === 'string' ? d : d.name));
    } else if (typeof record.diseaseType === 'string') {
      diseases.push(record.diseaseType);
    } else if (record.diseaseType.name) {
      diseases.push(record.diseaseType.name);
    }
  }
  if (record.primaryDiagnosis && !diseases.includes(record.primaryDiagnosis)) {
    diseases.push(record.primaryDiagnosis);
  }
  return diseases.filter(Boolean).slice(0, 3); // Limit to 3 tags
}

function formatType(type) {
  return type.replace(/_/g, ' ')
    .toLowerCase()
    .replace(/\b\w/g, c => c.toUpperCase());
}

function clearForm() {
  document.getElementById('searchForm').reset();
  document.getElementById('resultsContainer').classList.add('hidden');
  setStatus('searchStatus', '', '');
}

function setStatus(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = `status ${type}`;
}
</script>
